# Параметры расчёта «Новой цены». Все значения — доли (0.04 = 4%).

# Скидка от минимальной рыночной цены: Новая = Min × (1 − discount)
discount: 0.04

# Наценка на «Цену согл с уценкой», когда база ниже себестоимости и уценка задана.
# ВНИМАНИЕ: в ТЗ указано +1%, в фактическом файле применено +5%. Уточнить у заказчика.
markdown_markup: 0.05

# Наценка на себестоимость, когда база ниже себестоимости и уценки нет.
cost_markup: 0.04

# Округление новой цены: "1" — до целых рублей, "0.01" — до копеек, "10" — до 10 рублей.
rounding: "1"
